// ─── Auth Screen ─────────────────────────────────────────────────────────────

function AuthScreen({ onAuth }) {
  const [mode, setMode] = useState("login");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [name, setName] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    setError("");
    setLoading(true);
    try {
      if (mode === "login") {
        const { data, error: e } = await db.auth.signInWithPassword({ email, password });
        if (e) throw e;
        onAuth(data.user);
      } else {
        const { data, error: e } = await db.auth.signUp({ email, password });
        if (e) throw e;
        if (data.user) {
          await db.from("profiles").insert({ id: data.user.id, email, display_name: name || email.split("@")[0] });
          onAuth(data.user);
        }
      }
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  const inputStyle = {
    width: "100%", padding: "12px 16px", borderRadius: 12, border: "2px solid #f0d0e0",
    fontSize: 15, fontFamily: "Georgia, serif", color: "#3d2b2b", background: "#fff",
  };

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #fdf6f0 0%, #fce4ec 50%, #f3e5f5 100%)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div style={{ fontSize: 36, marginBottom: 8 }}>✨</div>
      <div style={{ fontSize: 28, fontWeight: "bold", color: "#e91e63", marginBottom: 4 }}>Glow & Grow</div>
      <div style={{ fontSize: 13, color: "#bbb", marginBottom: 32, fontStyle: "italic" }}>Your personal fitness companion</div>

      <div style={{ width: "100%", maxWidth: 360, background: "#fff", borderRadius: 20, padding: 28, boxShadow: "0 8px 32px rgba(233,30,99,0.12)" }}>
        <div style={{ display: "flex", borderRadius: 12, overflow: "hidden", border: "2px solid #f0d0e0", marginBottom: 24 }}>
          {["login", "signup"].map(m => (
            <button key={m} onClick={() => { setMode(m); setError(""); }} style={{
              flex: 1, padding: "10px 0", border: "none", cursor: "pointer", fontSize: 13, fontWeight: "bold", fontFamily: "Georgia, serif",
              background: mode === m ? "#e91e63" : "#fff", color: mode === m ? "#fff" : "#bbb", textTransform: "capitalize",
            }}>{m === "login" ? "Sign In" : "Sign Up"}</button>
          ))}
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {mode === "signup" && (
            <input value={name} onChange={e => setName(e.target.value)} placeholder="Your name (e.g. Mimi)" style={inputStyle} />
          )}
          <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="Email" style={inputStyle} />
          <input type="password" value={password} onChange={e => setPassword(e.target.value)}
            onKeyDown={e => e.key === "Enter" && submit()} placeholder="Password" style={inputStyle} />

          {error && <div style={{ fontSize: 13, color: "#e91e63", textAlign: "center", padding: "8px 12px", background: "#fff5f7", borderRadius: 8 }}>{error}</div>}

          <button onClick={submit} disabled={loading} style={{
            padding: "13px 0", borderRadius: 12, border: "none", marginTop: 4,
            background: loading ? "#f0c0d0" : "linear-gradient(135deg, #e91e63, #9c27b0)",
            color: "#fff", fontWeight: "bold", fontSize: 15, cursor: loading ? "default" : "pointer", fontFamily: "Georgia, serif",
          }}>
            {loading ? "Please wait…" : mode === "login" ? "Sign In" : "Create Account"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Partner Settings Modal ──────────────────────────────────────────────────

function PartnerModal({ profile, onClose, onLinked }) {
  const [partnerEmail, setPartnerEmail] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [success, setSuccess] = useState(false);

  const link = async () => {
    setError("");
    setLoading(true);
    try {
      const { data: partners, error: e } = await db.from("profiles").select("id, display_name").eq("email", partnerEmail.trim().toLowerCase());
      if (e) throw e;
      if (!partners || partners.length === 0) throw new Error("No account found with that email. Ask them to sign up first.");
      const partner = partners[0];
      if (partner.id === profile.id) throw new Error("That's your own email!");
      const { error: e2 } = await db.from("profiles").update({ partner_id: partner.id }).eq("id", profile.id);
      if (e2) throw e2;
      setSuccess(true);
      onLinked({ ...profile, partner_id: partner.id }, partner);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  const unlink = async () => {
    setLoading(true);
    await db.from("profiles").update({ partner_id: null }).eq("id", profile.id);
    onLinked({ ...profile, partner_id: null }, null);
    setLoading(false);
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 20 }} onClick={onClose}>
      <div style={{ background: "#fff", borderRadius: 20, padding: 28, width: "100%", maxWidth: 360, boxShadow: "0 16px 48px rgba(0,0,0,0.15)" }} onClick={e => e.stopPropagation()}>
        <div style={{ fontWeight: "bold", fontSize: 18, color: "#9c27b0", marginBottom: 4 }}>💞 Partner Link</div>
        <div style={{ fontSize: 13, color: "#bbb", marginBottom: 20 }}>Link your partner so you can view their progress</div>

        {profile.partner_id ? (
          <div>
            <div style={{ background: "#f0fff0", border: "2px solid #a5d6a7", borderRadius: 12, padding: "12px 16px", marginBottom: 16, fontSize: 14, color: "#388e3c" }}>
              ✓ Partner linked
            </div>
            <button onClick={unlink} disabled={loading} style={{ width: "100%", padding: "12px 0", borderRadius: 12, border: "2px solid #f0d0e0", background: "#fff", color: "#e91e63", fontWeight: "bold", fontSize: 14, cursor: "pointer", fontFamily: "Georgia, serif" }}>
              Unlink Partner
            </button>
          </div>
        ) : success ? (
          <div style={{ background: "#f0fff0", border: "2px solid #a5d6a7", borderRadius: 12, padding: "12px 16px", fontSize: 14, color: "#388e3c" }}>
            ✓ Partner linked! Close this to view their data.
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <input
              type="email" value={partnerEmail} onChange={e => setPartnerEmail(e.target.value)}
              onKeyDown={e => e.key === "Enter" && link()}
              placeholder="Partner's email address"
              style={{ width: "100%", padding: "12px 16px", borderRadius: 12, border: "2px solid #f0d0e0", fontSize: 14, fontFamily: "Georgia, serif", color: "#3d2b2b" }}
            />
            {error && <div style={{ fontSize: 13, color: "#e91e63", background: "#fff5f7", borderRadius: 8, padding: "8px 12px" }}>{error}</div>}
            <button onClick={link} disabled={loading} style={{ padding: "12px 0", borderRadius: 12, border: "none", background: "linear-gradient(135deg, #e91e63, #9c27b0)", color: "#fff", fontWeight: "bold", fontSize: 14, cursor: "pointer", fontFamily: "Georgia, serif" }}>
              {loading ? "Searching…" : "Link Partner"}
            </button>
          </div>
        )}

        <button onClick={onClose} style={{ width: "100%", marginTop: 12, padding: "10px 0", borderRadius: 12, border: "none", background: "#f5f5f5", color: "#999", fontSize: 13, cursor: "pointer", fontFamily: "Georgia, serif" }}>Close</button>
      </div>
    </div>
  );
}

// ─── Main App ────────────────────────────────────────────────────────────────

function App() {
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);
  const [partnerProfile, setPartnerProfile] = useState(null);
  const [viewingPartner, setViewingPartner] = useState(false);
  const [showPartnerModal, setShowPartnerModal] = useState(false);
  const [appLoading, setAppLoading] = useState(true);

  const [level, setLevel] = useState("beginner");
  const [completedExercises, setCompletedExercises] = useState({});
  const [activeDay, setActiveDay] = useState(0);
  const [tab, setTab] = useState("workout");
  const [expandedEx, setExpandedEx] = useState(null);
  const [quoteIdx] = useState(Math.floor(Math.random() * motivationalQuotes.length));
  const [weightLog, setWeightLog] = useState([]);
  const [weightInput, setWeightInput] = useState("");
  const [weightUnit, setWeightUnit] = useState("lbs");
  const [exerciseWeights, setExerciseWeights] = useState({});
  const [editingEx, setEditingEx] = useState(null);
  const [exWeightInput, setExWeightInput] = useState("");

  // Auth listener
  useEffect(() => {
    db.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) loadUser(session.user);
      else setAppLoading(false);
    });
    const { data: { subscription } } = db.auth.onAuthStateChange((_, session) => {
      if (!session) { setUser(null); setProfile(null); setAppLoading(false); }
    });
    return () => subscription.unsubscribe();
  }, []);

  const loadUser = async (u) => {
    setUser(u);
    const { data: prof } = await db.from("profiles").select("*").eq("id", u.id).single();
    if (prof) {
      setProfile(prof);
      if (prof.partner_id) {
        const { data: pProf } = await db.from("profiles").select("*").eq("id", prof.partner_id).single();
        setPartnerProfile(pProf);
      }
    }
    setAppLoading(false);
  };

  const activeUserId = viewingPartner && partnerProfile ? partnerProfile.id : user?.id;

  const loadData = useCallback(async (userId) => {
    if (!userId) return;
    const [{ data: completed }, { data: wlog }, { data: exw }] = await Promise.all([
      db.from("completed_exercises").select("key").eq("user_id", userId),
      db.from("weight_logs").select("*").eq("user_id", userId).order("logged_at", { ascending: true }),
      db.from("exercise_weights").select("key, value").eq("user_id", userId),
    ]);
    const cMap = {};
    (completed || []).forEach(r => { cMap[r.key] = true; });
    setCompletedExercises(cMap);
    setWeightLog(wlog || []);
    const eMap = {};
    (exw || []).forEach(r => { eMap[r.key] = r.value; });
    setExerciseWeights(eMap);
  }, []);

  useEffect(() => {
    if (activeUserId) loadData(activeUserId);
  }, [activeUserId, loadData]);

  const plan = workoutPlans[level];
  const dayData = plan.days[activeDay];
  const quote = motivationalQuotes[quoteIdx];
  const isReadOnly = viewingPartner;

  const toggleExercise = async (exIdx) => {
    if (isReadOnly) return;
    const key = `${level}-${activeDay}-${exIdx}`;
    const wasCompleted = !!completedExercises[key];
    setCompletedExercises(prev => ({ ...prev, [key]: !wasCompleted }));
    if (wasCompleted) {
      await db.from("completed_exercises").delete().eq("user_id", user.id).eq("key", key);
    } else {
      await db.from("completed_exercises").upsert({ user_id: user.id, key });
    }
  };

  const isCompleted = (exIdx) => !!completedExercises[`${level}-${activeDay}-${exIdx}`];

  const dayCalBurned = dayData.exercises.reduce((sum, ex, i) => isCompleted(i) ? sum + ex.cal : sum, 0);
  const totalWeekCal = plan.days.reduce((s, d) => s + d.totalCal, 0);
  const completedDays = plan.days.filter((_, di) =>
    plan.days[di].exercises.every((_, ei) => !!completedExercises[`${level}-${di}-${ei}`])
  ).length;

  const cardioCount = dayData.exercises.filter(e => e.type === "cardio").length;
  const gymCount = dayData.exercises.filter(e => e.type === "gym").length;
  const absCount = dayData.exercises.filter(e => e.type === "abs").length;

  const addWeight = async () => {
    if (isReadOnly) return;
    const val = parseFloat(weightInput);
    if (isNaN(val) || val <= 0) return;
    const today = new Date().toLocaleDateString("en-US", { month: "short", day: "numeric" });
    const { data } = await db.from("weight_logs").insert({ user_id: user.id, weight: val, unit: weightUnit, date: today }).select().single();
    if (data) setWeightLog(prev => [...prev, data]);
    setWeightInput("");
  };

  const deleteWeight = async (id) => {
    if (isReadOnly) return;
    await db.from("weight_logs").delete().eq("id", id);
    setWeightLog(prev => prev.filter(e => e.id !== id));
  };

  const saveExWeight = async (key) => {
    if (isReadOnly) return;
    const val = exWeightInput.trim();
    if (!val) return;
    await db.from("exercise_weights").upsert({ user_id: user.id, key, value: val }, { onConflict: "user_id,key" });
    setExerciseWeights(prev => ({ ...prev, [key]: val }));
    setEditingEx(null);
    setExWeightInput("");
  };

  const clearExWeight = async (key) => {
    if (isReadOnly) return;
    await db.from("exercise_weights").delete().eq("user_id", user.id).eq("key", key);
    setExerciseWeights(prev => { const n = { ...prev }; delete n[key]; return n; });
  };

  const signOut = async () => {
    await db.auth.signOut();
    setUser(null); setProfile(null); setPartnerProfile(null); setViewingPartner(false);
  };

  const startWeight = weightLog.length > 0 ? weightLog[0].weight : null;
  const currentWeight = weightLog.length > 0 ? weightLog[weightLog.length - 1].weight : null;
  const totalLost = startWeight && currentWeight ? (startWeight - currentWeight).toFixed(1) : null;

  if (appLoading) return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg, #fdf6f0, #fce4ec, #f3e5f5)" }}>
      <div style={{ textAlign: "center" }}>
        <div style={{ fontSize: 40, marginBottom: 12 }}>✨</div>
        <div style={{ color: "#e91e63", fontSize: 14 }}>Loading…</div>
      </div>
    </div>
  );

  if (!user) return <AuthScreen onAuth={loadUser} />;

  const viewerName = viewingPartner && partnerProfile ? (partnerProfile.display_name || "Partner") : (profile?.display_name || "You");

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #fdf6f0 0%, #fce4ec 50%, #f3e5f5 100%)", fontFamily: "Georgia, serif", color: "#3d2b2b", maxWidth: 480, margin: "0 auto" }}>

      {showPartnerModal && (
        <PartnerModal
          profile={profile}
          onClose={() => setShowPartnerModal(false)}
          onLinked={(updatedProfile, pProf) => {
            setProfile(updatedProfile);
            setPartnerProfile(pProf);
            if (!pProf) setViewingPartner(false);
            setShowPartnerModal(false);
          }}
        />
      )}

      {/* Header */}
      <div style={{ background: "linear-gradient(90deg, #e91e63, #9c27b0)", padding: "20px 20px 14px", boxShadow: "0 4px 20px rgba(233,30,99,0.3)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, color: "rgba(255,255,255,0.7)", letterSpacing: 4, textTransform: "uppercase", marginBottom: 2 }}>Your Personal</div>
            <div style={{ fontSize: 26, fontWeight: "bold", color: "#fff", letterSpacing: 1 }}>✨ Glow & Grow ✨</div>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 4 }}>
            {partnerProfile && (
              <button onClick={() => { setViewingPartner(v => !v); setExpandedEx(null); }} style={{
                padding: "6px 12px", borderRadius: 20, border: "2px solid rgba(255,255,255,0.5)",
                background: viewingPartner ? "#fff" : "rgba(255,255,255,0.15)",
                color: viewingPartner ? "#e91e63" : "#fff",
                fontSize: 11, fontWeight: "bold", cursor: "pointer", fontFamily: "Georgia, serif",
              }}>
                {viewingPartner ? `👁 ${partnerProfile.display_name}` : "👁 Partner"}
              </button>
            )}
            <button onClick={() => setShowPartnerModal(true)} style={{ background: "rgba(255,255,255,0.15)", border: "none", borderRadius: 20, padding: "6px 10px", color: "#fff", fontSize: 11, cursor: "pointer", fontFamily: "Georgia, serif" }}>💞</button>
            <button onClick={signOut} style={{ background: "rgba(255,255,255,0.15)", border: "none", borderRadius: 20, padding: "6px 10px", color: "#fff", fontSize: 11, cursor: "pointer", fontFamily: "Georgia, serif" }}>Out</button>
          </div>
        </div>
        <div style={{ fontSize: 12, color: "rgba(255,255,255,0.7)", marginTop: 6, fontStyle: "italic" }}>"{quote.text}"</div>
        <div style={{ fontSize: 10, color: "rgba(255,255,255,0.5)", marginTop: 1 }}>{quote.author}</div>
      </div>

      {/* Viewing partner banner */}
      {viewingPartner && (
        <div style={{ background: "#9c27b0", padding: "8px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ color: "#fff", fontSize: 12, fontWeight: "bold" }}>👁 Viewing {partnerProfile.display_name}'s data (read-only)</div>
          <button onClick={() => setViewingPartner(false)} style={{ background: "rgba(255,255,255,0.2)", border: "none", borderRadius: 10, padding: "3px 10px", color: "#fff", fontSize: 11, cursor: "pointer", fontFamily: "Georgia, serif" }}>Switch to mine</button>
        </div>
      )}

      {/* Level Selector */}
      <div style={{ display: "flex", gap: 10, padding: "16px 16px 0", justifyContent: "center" }}>
        {["beginner", "intermediate"].map(l => (
          <button key={l} onClick={() => { setLevel(l); setActiveDay(0); setExpandedEx(null); }} style={{
            padding: "8px 20px", borderRadius: 20, border: "2px solid",
            borderColor: level === l ? "#e91e63" : "#ddd",
            background: level === l ? "#e91e63" : "#fff",
            color: level === l ? "#fff" : "#999",
            fontWeight: "bold", fontSize: 13, cursor: "pointer", textTransform: "capitalize",
          }}>{workoutPlans[l].label}</button>
        ))}
      </div>

      {/* Stats */}
      <div style={{ display: "flex", gap: 10, padding: "14px 16px", overflowX: "auto" }}>
        {[
          { label: "Week Cal Burn", value: `~${totalWeekCal}`, unit: "kcal" },
          { label: "Days Done", value: `${completedDays}/7`, unit: "days" },
          { label: "Today's Burn", value: `~${dayCalBurned}`, unit: "kcal earned" },
        ].map(stat => (
          <div key={stat.label} style={{ flex: "0 0 auto", background: "#fff", borderRadius: 14, padding: "12px 16px", boxShadow: "0 2px 12px rgba(233,30,99,0.1)", minWidth: 100, textAlign: "center" }}>
            <div style={{ fontSize: 20, fontWeight: "bold", color: "#e91e63" }}>{stat.value}</div>
            <div style={{ fontSize: 10, color: "#999", marginTop: 2 }}>{stat.unit}</div>
            <div style={{ fontSize: 11, color: "#bbb", marginTop: 1 }}>{stat.label}</div>
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", borderBottom: "2px solid #f0d0e0", margin: "0 16px" }}>
        {[{ id: "workout", label: "💪 Workout" }, { id: "weight", label: "⚖️ Weight" }, { id: "tips", label: "🥗 Tips" }].map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            flex: 1, padding: "12px 0", border: "none", background: "none",
            borderBottom: tab === t.id ? "3px solid #e91e63" : "3px solid transparent",
            color: tab === t.id ? "#e91e63" : "#bbb",
            fontWeight: "bold", fontSize: 12, cursor: "pointer", marginBottom: -2,
          }}>{t.label}</button>
        ))}
      </div>

      {/* WORKOUT TAB */}
      {tab === "workout" && (
        <div style={{ padding: 16 }}>
          <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 8, marginBottom: 16 }}>
            {plan.days.map((d, i) => {
              const allDone = d.exercises.every((_, ei) => !!completedExercises[`${level}-${i}-${ei}`]);
              return (
                <button key={i} onClick={() => { setActiveDay(i); setExpandedEx(null); }} style={{
                  flex: "0 0 auto", padding: "10px 14px", borderRadius: 12, border: "2px solid",
                  borderColor: activeDay === i ? "#e91e63" : allDone ? "#4caf50" : "#e8d0dc",
                  background: activeDay === i ? "#e91e63" : allDone ? "#e8f5e9" : "#fff",
                  color: activeDay === i ? "#fff" : allDone ? "#4caf50" : "#888",
                  cursor: "pointer", textAlign: "center", fontSize: 11, fontWeight: "bold", minWidth: 70,
                }}>
                  <div style={{ fontSize: 16 }}>{d.emoji}</div>
                  <div style={{ marginTop: 2 }}>{d.day.slice(0, 3)}</div>
                  {allDone && <div style={{ fontSize: 10, marginTop: 1 }}>✓ Done</div>}
                </button>
              );
            })}
          </div>

          <div style={{ background: "linear-gradient(135deg, #e91e63, #9c27b0)", borderRadius: 16, padding: "16px 20px", marginBottom: 10, display: "flex", justifyContent: "space-between", alignItems: "center", boxShadow: "0 4px 20px rgba(233,30,99,0.2)" }}>
            <div>
              <div style={{ color: "rgba(255,255,255,0.7)", fontSize: 12, textTransform: "uppercase", letterSpacing: 2 }}>{dayData.day}</div>
              <div style={{ color: "#fff", fontSize: 20, fontWeight: "bold", marginTop: 2 }}>{dayData.emoji} {dayData.focus}</div>
              <div style={{ color: "rgba(255,255,255,0.8)", fontSize: 12, marginTop: 4 }}>~{dayData.totalCal} kcal potential burn</div>
            </div>
            <div style={{ textAlign: "center" }}>
              <div style={{ color: "#fff", fontSize: 26, fontWeight: "bold" }}>{dayData.exercises.filter((_, i) => isCompleted(i)).length}/{dayData.exercises.length}</div>
              <div style={{ color: "rgba(255,255,255,0.7)", fontSize: 11 }}>done</div>
            </div>
          </div>

          <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap" }}>
            <div style={{ background: "#fff3e0", borderRadius: 10, padding: "6px 12px", fontSize: 12, color: "#e65100", fontWeight: "bold" }}>🏃‍♀️ {cardioCount} Cardio</div>
            <div style={{ background: "#f3e5f5", borderRadius: 10, padding: "6px 12px", fontSize: 12, color: "#6a1b9a", fontWeight: "bold" }}>🏋️ {gymCount} Gym</div>
            {absCount > 0 && <div style={{ background: "#e8f5e9", borderRadius: 10, padding: "6px 12px", fontSize: 12, color: "#2e7d32", fontWeight: "bold" }}>💚 {absCount} Abs</div>}
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {dayData.exercises.map((ex, i) => {
              const isCardio = ex.type === "cardio";
              const isAbs = ex.type === "abs";
              const exKey = `${level}-${activeDay}-${i}-weight`;
              const savedW = exerciseWeights[exKey];
              const isEditingThis = editingEx === exKey;

              return (
                <div key={i} style={{ borderRadius: 14, overflow: "hidden", boxShadow: isCompleted(i) ? "0 2px 10px rgba(76,175,80,0.15)" : "0 2px 10px rgba(0,0,0,0.05)" }}>
                  <div onClick={() => toggleExercise(i)} style={{
                    background: isCompleted(i) ? "linear-gradient(135deg, #e8f5e9, #f1f8e9)" : isCardio ? "#fff8f0" : isAbs ? "#f0fff4" : "#fff",
                    padding: "14px 16px", display: "flex", alignItems: "center", gap: 14,
                    border: isCompleted(i) ? "2px solid #a5d6a7" : isCardio ? "2px solid #ffe0b2" : isAbs ? "2px solid #c8e6c9" : "2px solid transparent",
                    cursor: isReadOnly ? "default" : "pointer",
                  }}>
                    <div style={{
                      width: 32, height: 32, borderRadius: "50%", flexShrink: 0,
                      background: isCompleted(i) ? "#4caf50" : isCardio ? "#ff9800" : isAbs ? "#43a047" : "#f3e5f5",
                      display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, color: "#fff",
                    }}>
                      {isCompleted(i) ? "✓" : isCardio ? "🏃" : isAbs ? "💚" : "🏋️"}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <div style={{ fontWeight: "bold", fontSize: 14, color: isCompleted(i) ? "#388e3c" : "#3d2b2b", textDecoration: isCompleted(i) ? "line-through" : "none" }}>
                          {ex.name}
                        </div>
                        {i === 0 && <span style={{ fontSize: 9, background: "#ff9800", color: "#fff", borderRadius: 6, padding: "1px 6px", fontWeight: "bold" }}>START</span>}
                      </div>
                      <div style={{ fontSize: 12, color: "#999", marginTop: 2 }}>
                        {ex.sets > 1 ? `${ex.sets} sets × ` : ""}{ex.reps}
                      </div>
                      {!isCardio && !isReadOnly && (
                        <div style={{ marginTop: 6 }}>
                          {isEditingThis ? (
                            <div style={{ display: "flex", gap: 5, alignItems: "center" }} onClick={e => e.stopPropagation()}>
                              <input
                                autoFocus value={exWeightInput} onChange={e => setExWeightInput(e.target.value)}
                                onKeyDown={e => { if (e.key === "Enter") saveExWeight(exKey); if (e.key === "Escape") { setEditingEx(null); setExWeightInput(""); }}}
                                placeholder="e.g. 25 lbs"
                                style={{ width: 95, padding: "3px 8px", borderRadius: 8, border: "1.5px solid #e91e63", fontSize: 12, outline: "none", fontFamily: "Georgia, serif" }}
                              />
                              <button onClick={() => saveExWeight(exKey)} style={{ background: "#e91e63", border: "none", borderRadius: 6, color: "#fff", fontSize: 11, padding: "3px 8px", cursor: "pointer", fontWeight: "bold" }}>✓</button>
                              <button onClick={() => { setEditingEx(null); setExWeightInput(""); }} style={{ background: "#eee", border: "none", borderRadius: 6, color: "#999", fontSize: 11, padding: "3px 8px", cursor: "pointer" }}>✕</button>
                            </div>
                          ) : savedW ? (
                            <div style={{ display: "flex", alignItems: "center", gap: 5 }} onClick={e => e.stopPropagation()}>
                              <span style={{ fontSize: 11, background: "#fce4ec", color: "#c2185b", borderRadius: 8, padding: "2px 8px", fontWeight: "bold" }}>🏋️ {savedW}</span>
                              <button onClick={() => { setEditingEx(exKey); setExWeightInput(savedW); }} style={{ background: "none", border: "none", fontSize: 11, color: "#bbb", cursor: "pointer", padding: 0 }}>edit</button>
                              <button onClick={() => clearExWeight(exKey)} style={{ background: "none", border: "none", fontSize: 11, color: "#e0b0b0", cursor: "pointer", padding: 0 }}>✕</button>
                            </div>
                          ) : (
                            <button onClick={e => { e.stopPropagation(); setEditingEx(exKey); setExWeightInput(""); }} style={{ background: "none", border: "1.5px dashed #f0c0d0", borderRadius: 8, color: "#d4889a", fontSize: 11, padding: "2px 8px", cursor: "pointer" }}>
                              + log weight
                            </button>
                          )}
                        </div>
                      )}
                      {!isCardio && isReadOnly && savedW && (
                        <div style={{ marginTop: 6 }}>
                          <span style={{ fontSize: 11, background: "#fce4ec", color: "#c2185b", borderRadius: 8, padding: "2px 8px", fontWeight: "bold" }}>🏋️ {savedW}</span>
                        </div>
                      )}
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4 }}>
                      <div style={{ textAlign: "right" }}>
                        <div style={{ fontSize: 14, fontWeight: "bold", color: "#e91e63" }}>{ex.cal}</div>
                        <div style={{ fontSize: 10, color: "#ccc" }}>kcal</div>
                      </div>
                      <div onClick={e => { e.stopPropagation(); setExpandedEx(expandedEx === i ? null : i); }} style={{ fontSize: 11, color: "#bbb", cursor: "pointer", padding: "2px 6px", borderRadius: 8, background: "#f5f5f5" }}>
                        {expandedEx === i ? "▲" : "▼ tip"}
                      </div>
                    </div>
                  </div>
                  {expandedEx === i && (
                    <div style={{ background: "#fff9fb", padding: "10px 16px", fontSize: 13, color: "#7b4f6a", fontStyle: "italic", border: isCardio ? "2px solid #ffe0b2" : isAbs ? "2px solid #c8e6c9" : "2px solid #f5c6d8", borderTop: "none", borderLeft: isCardio ? "4px solid #ff9800" : isAbs ? "4px solid #43a047" : "4px solid #e91e63" }}>
                      💡 {ex.note}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          <div style={{ marginTop: 20, background: "#f5e6ee", borderRadius: 20, height: 8, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${(dayData.exercises.filter((_, i) => isCompleted(i)).length / dayData.exercises.length) * 100}%`, background: "linear-gradient(90deg, #e91e63, #9c27b0)", borderRadius: 20, transition: "width 0.4s ease" }} />
          </div>
          <div style={{ textAlign: "center", fontSize: 12, color: "#bbb", marginTop: 6 }}>
            {Math.round((dayData.exercises.filter((_, i) => isCompleted(i)).length / dayData.exercises.length) * 100)}% complete
          </div>
        </div>
      )}

      {/* WEIGHT TAB */}
      {tab === "weight" && (
        <div style={{ padding: 16 }}>
          {viewingPartner && (
            <div style={{ background: "#f3e5f5", borderRadius: 12, padding: "10px 14px", marginBottom: 14, fontSize: 13, color: "#7b1fa2", fontStyle: "italic" }}>
              Viewing {partnerProfile.display_name}'s weight log
            </div>
          )}

          {weightLog.length >= 2 && (
            <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
              {[
                { label: "Starting", value: `${startWeight} ${weightLog[0].unit}`, color: "#9c27b0" },
                { label: "Current", value: `${currentWeight} ${weightLog[weightLog.length-1].unit}`, color: "#e91e63" },
                { label: totalLost > 0 ? "Lost 🎉" : "Gained", value: `${Math.abs(totalLost)} ${weightLog[0].unit}`, color: totalLost > 0 ? "#4caf50" : "#ff9800" },
              ].map(stat => (
                <div key={stat.label} style={{ flex: 1, background: "#fff", borderRadius: 14, padding: "12px 10px", textAlign: "center", boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }}>
                  <div style={{ fontSize: 16, fontWeight: "bold", color: stat.color }}>{stat.value}</div>
                  <div style={{ fontSize: 11, color: "#bbb", marginTop: 2 }}>{stat.label}</div>
                </div>
              ))}
            </div>
          )}

          {!isReadOnly && (
            <div style={{ background: "#fff", borderRadius: 16, padding: 16, boxShadow: "0 2px 12px rgba(233,30,99,0.08)", marginBottom: 16 }}>
              <div style={{ fontWeight: "bold", fontSize: 14, color: "#9c27b0", marginBottom: 12 }}>📝 Log Today's Weight</div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <input
                  type="number" value={weightInput} onChange={e => setWeightInput(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && addWeight()}
                  placeholder="e.g. 145"
                  style={{ flex: 1, padding: "10px 14px", borderRadius: 12, border: "2px solid #f0d0e0", fontSize: 16, outline: "none", fontFamily: "Georgia, serif", color: "#3d2b2b" }}
                />
                <div style={{ display: "flex", borderRadius: 12, overflow: "hidden", border: "2px solid #f0d0e0" }}>
                  {["lbs", "kg"].map(u => (
                    <button key={u} onClick={() => setWeightUnit(u)} style={{ padding: "10px 12px", border: "none", cursor: "pointer", fontSize: 13, fontWeight: "bold", fontFamily: "Georgia, serif", background: weightUnit === u ? "#e91e63" : "#fff", color: weightUnit === u ? "#fff" : "#bbb" }}>{u}</button>
                  ))}
                </div>
                <button onClick={addWeight} style={{ padding: "10px 16px", borderRadius: 12, border: "none", background: "linear-gradient(135deg, #e91e63, #9c27b0)", color: "#fff", fontWeight: "bold", fontSize: 14, cursor: "pointer" }}>+</button>
              </div>
            </div>
          )}

          {weightLog.length >= 2 && (() => {
            const min = Math.min(...weightLog.map(e => e.weight));
            const max = Math.max(...weightLog.map(e => e.weight));
            const range = max - min || 1;
            const W = 300, H = 120, PAD = 16;
            const pts = weightLog.map((e, i) => ({
              x: PAD + (i / (weightLog.length - 1)) * (W - PAD * 2),
              y: PAD + ((max - e.weight) / range) * (H - PAD * 2),
            }));
            const path = pts.map((p, i) => `${i === 0 ? "M" : "L"} ${p.x} ${p.y}`).join(" ");
            const area = `${path} L ${pts[pts.length-1].x} ${H} L ${pts[0].x} ${H} Z`;
            return (
              <div style={{ background: "#fff", borderRadius: 16, padding: 16, boxShadow: "0 2px 12px rgba(233,30,99,0.08)", marginBottom: 16 }}>
                <div style={{ fontWeight: "bold", fontSize: 14, color: "#9c27b0", marginBottom: 12 }}>📉 Progress Chart</div>
                <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ overflow: "visible" }}>
                  <defs>
                    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor="#e91e63" stopOpacity="0.2" />
                      <stop offset="100%" stopColor="#e91e63" stopOpacity="0" />
                    </linearGradient>
                  </defs>
                  <path d={area} fill="url(#areaGrad)" />
                  <path d={path} fill="none" stroke="#e91e63" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
                  {pts.map((p, i) => (
                    <g key={i}>
                      <circle cx={p.x} cy={p.y} r="4" fill="#e91e63" />
                      <text x={p.x} y={p.y - 8} textAnchor="middle" fontSize="9" fill="#999">{weightLog[i].weight}</text>
                    </g>
                  ))}
                  <text x={pts[0].x} y={H - 2} textAnchor="middle" fontSize="9" fill="#ccc">{weightLog[0].date}</text>
                  <text x={pts[pts.length-1].x} y={H - 2} textAnchor="middle" fontSize="9" fill="#ccc">{weightLog[weightLog.length-1].date}</text>
                </svg>
              </div>
            );
          })()}

          {weightLog.length > 0 ? (
            <div style={{ background: "#fff", borderRadius: 16, padding: 16, boxShadow: "0 2px 12px rgba(233,30,99,0.08)" }}>
              <div style={{ fontWeight: "bold", fontSize: 14, color: "#9c27b0", marginBottom: 12 }}>📋 Log History</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {[...weightLog].reverse().map((entry, i) => {
                  const realIdx = weightLog.length - 1 - i;
                  const prev = weightLog[realIdx - 1];
                  const diff = prev ? (entry.weight - prev.weight).toFixed(1) : null;
                  return (
                    <div key={entry.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 12px", borderRadius: 12, background: realIdx === weightLog.length - 1 ? "#fff5f8" : "#fafafa", border: realIdx === weightLog.length - 1 ? "2px solid #f5c6d8" : "2px solid transparent" }}>
                      <div>
                        <div style={{ fontWeight: "bold", fontSize: 14, color: "#3d2b2b" }}>{entry.weight} {entry.unit}</div>
                        <div style={{ fontSize: 11, color: "#bbb", marginTop: 1 }}>{entry.date}</div>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        {diff !== null && <div style={{ fontSize: 13, fontWeight: "bold", color: parseFloat(diff) < 0 ? "#4caf50" : parseFloat(diff) > 0 ? "#f44336" : "#bbb" }}>{parseFloat(diff) > 0 ? "+" : ""}{diff}</div>}
                        {!isReadOnly && <button onClick={() => deleteWeight(entry.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 16, color: "#ddd", padding: 4 }}>✕</button>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          ) : (
            <div style={{ textAlign: "center", padding: "40px 20px", color: "#ccc" }}>
              <div style={{ fontSize: 40, marginBottom: 10 }}>⚖️</div>
              <div style={{ fontSize: 14 }}>{isReadOnly ? `${partnerProfile.display_name} hasn't logged any weight yet` : "Log your first weight above to start tracking"}</div>
            </div>
          )}
        </div>
      )}

      {/* TIPS TAB */}
      {tab === "tips" && (
        <div style={{ padding: 16 }}>
          <div style={{ marginBottom: 16, textAlign: "center" }}>
            <div style={{ fontSize: 22, marginBottom: 4 }}>🌿</div>
            <div style={{ fontWeight: "bold", fontSize: 16, color: "#9c27b0" }}>Calorie-Cutting Tips</div>
            <div style={{ fontSize: 12, color: "#bbb", marginTop: 2 }}>Small habits = big results over time</div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {tips.map((tip, i) => (
              <div key={i} style={{ background: "#fff", borderRadius: 14, padding: "14px 16px", boxShadow: "0 2px 10px rgba(0,0,0,0.05)", borderLeft: "4px solid #e91e63", fontSize: 14, color: "#3d2b2b", lineHeight: 1.5 }}>{tip}</div>
            ))}
          </div>
          <div style={{ marginTop: 20, background: "linear-gradient(135deg, #e91e63, #9c27b0)", borderRadius: 16, padding: "18px 20px", color: "#fff", textAlign: "center", boxShadow: "0 4px 20px rgba(233,30,99,0.25)" }}>
            <div style={{ fontSize: 18, marginBottom: 6 }}>🎯 Daily Calorie Goal</div>
            <div style={{ fontSize: 36, fontWeight: "bold" }}>1,400 – 1,600</div>
            <div style={{ fontSize: 12, opacity: 0.8, marginTop: 4 }}>kcal/day for steady weight loss</div>
            <div style={{ fontSize: 11, opacity: 0.6, marginTop: 8 }}>Always consult a doctor for personalized targets</div>
          </div>
        </div>
      )}

      <div style={{ height: 32 }} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
