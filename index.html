    }

    ::-webkit-scrollbar { display: none; }
    button, input { font-family: "EB Garamond", serif; letter-spacing: 0.03em; }
    input:focus { outline: none; border-color: var(--terracotta) !important; }

    .app-shell {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: rgba(253,250,245,0.72);
      backdrop-filter: blur(10px);
      border-left: 1px solid rgba(255,255,255,0.3);
      border-right: 1px solid rgba(255,255,255,0.3);
    }

    /* ── Header ── */
    .header {
      padding: 40px 28px 32px;
      background: linear-gradient(145deg, rgba(9,47,51,0.96), rgba(75,91,52,0.92));
      color: #f8f5ef;
      position: relative;
      overflow: hidden;
    }
    .header::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(127,199,204,0.25), transparent 35%),
        radial-gradient(circle at bottom left, rgba(228,203,169,0.15), transparent 30%);
      pointer-events: none;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      position: relative;
      z-index: 2;
    }
    .eyebrow {
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: lowercase;
      opacity: 0.55;
      margin-bottom: 10px;
    }
    .brand {
      font-family: "Cormorant Garamond", serif;
      font-size: 40px;
      font-weight: 400;
      font-style: italic;
      letter-spacing: 2px;
      line-height: 0.95;
    }
    .user-switch { display: flex; flex-direction: column; gap: 8px; }
    .user-btn {
      border: 0.5px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.8);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 12px;
      cursor: pointer;
    }

const tips = [
  "Drink a glass of water before every meal ✿",
  "Sleep 7–8 hours — poor sleep spikes hunger hormones ˘ω˘",
  "Protein at every meal keeps you full longer ★",
  "Don't skip breakfast — it sets your metabolism for the day ✦",
  "Take progress photos, not just scale numbers ◎",
  "Walk 8,000–10,000 steps daily even on rest days ♪",
  "Eat slowly and chew thoroughly — it takes 20 min to feel full ✿",
  "Prep meals Sunday so weekdays don't derail you ♡",
  "Log your weights in the gym — progressive overload = results ★",
  "Cardio first gets your heart rate up and warms your joints for lifting ◎",
];

const motivationalQuotes = [
  { text: "A strong believer is better and is more beloved to Allah than a weak believer.” (Sahih Muslim, Kitab al-qadr, Hadith 2664)"}
];

// ─── App ─────────────────────────────────────────────────────────────────────

function App() {
  const [activeUser, setActiveUser] = useState(USERS.sadiya);
  const [loading, setLoading] = useState(true);
  const [level, setLevel] = useState("beginner");
  const [completedExercises, setCompletedExercises] = useState({});
  const [activeDay, setActiveDay] = useState(() => (new Date().getDay() + 6) % 7);
  const [tab, setTab] = useState("workout");
  const [expandedEx, setExpandedEx] = useState(null);
  const [quoteIdx] = useState(Math.floor(Math.random() * motivationalQuotes.length));
  const [weightLog, setWeightLog] = useState([]);
  const [weightInput, setWeightInput] = useState("");
  const [weightUnit, setWeightUnit] = useState("lbs");
  const [exerciseWeights, setExerciseWeights] = useState({});
  const [editingEx, setEditingEx] = useState(null);
  const [exWeightInput, setExWeightInput] = useState("");
  const [mealLog, setMealLog] = useState([]);
  const [mealName, setMealName] = useState("");
  const [mealCal, setMealCal] = useState("");
  const [calEstimates, setCalEstimates] = useState([]);
  const [searching, setSearching] = useState(false);

  const today = new Date().toLocaleDateString("en-US", { month: "short", day: "numeric" });
  const CAL_GOALS = { sadiya: 1200, muhammad: 1500 };

  const loadData = useCallback(async (userKey) => {
    setLoading(true);
    const [{ data: completed }, { data: wlog }, { data: exw }, { data: meals }] = await Promise.all([
      db.from("completed_exercises").select("key").eq("user_key", userKey),
      db.from("weight_logs").select("*").eq("user_key", userKey).order("logged_at", { ascending: true }),
      db.from("exercise_weights").select("key, value").eq("user_key", userKey),
      db.from("meal_logs").select("*").eq("user_key", userKey).order("logged_at", { ascending: true }),
    ]);
    const cMap = {};
    (completed || []).forEach(r => { cMap[r.key] = true; });
    setCompletedExercises(cMap);
    setWeightLog(wlog || []);
    const eMap = {};
    (exw || []).forEach(r => { eMap[r.key] = r.value; });
    setExerciseWeights(eMap);
    setMealLog(meals || []);
    setLoading(false);
  }, []);

  useEffect(() => { loadData(activeUser); }, [activeUser, loadData]);

  const switchUser = (u) => { setActiveUser(u); setExpandedEx(null); setEditingEx(null); };

  const plan = workoutPlans[level];
  const dayData = plan.days[activeDay];
  const quote = motivationalQuotes[quoteIdx];

  const toggleExercise = async (exIdx) => {
    const key = `${level}-${activeDay}-${exIdx}`;
    const wasCompleted = !!completedExercises[key];
    setCompletedExercises(prev => ({ ...prev, [key]: !wasCompleted }));
    if (wasCompleted) {
      await db.from("completed_exercises").delete().eq("user_key", activeUser).eq("key", key);
    } else {
      await db.from("completed_exercises").upsert({ user_key: activeUser, key });
    }
  };

  const isCompleted = (exIdx) => !!completedExercises[`${level}-${activeDay}-${exIdx}`];

  const dayCalBurned = dayData.exercises.reduce((sum, ex, i) => isCompleted(i) ? sum + ex.cal : sum, 0);
  const totalWeekCal = plan.days.reduce((s, d) => s + d.totalCal, 0);
  const completedDays = plan.days.filter((_, di) =>
    plan.days[di].exercises.every((_, ei) => !!completedExercises[`${level}-${di}-${ei}`])
  ).length;
  const cardioCount = dayData.exercises.filter(e => e.type === "cardio").length;
  const gymCount   = dayData.exercises.filter(e => e.type === "gym").length;
  const absCount   = dayData.exercises.filter(e => e.type === "abs").length;
  const doneCount  = dayData.exercises.filter((_, i) => isCompleted(i)).length;
  const pct = Math.round((doneCount / dayData.exercises.length) * 100);

  const addWeight = async () => {
    const val = parseFloat(weightInput);
    if (isNaN(val) || val <= 0) return;
    const today = new Date().toLocaleDateString("en-US", { month: "short", day: "numeric" });
    const { data } = await db.from("weight_logs").insert({ user_key: activeUser, weight: val, unit: weightUnit, date: today }).select().single();
    if (data) setWeightLog(prev => [...prev, data]);
    setWeightInput("");
  };

  const deleteWeight = async (id) => {
    await db.from("weight_logs").delete().eq("id", id);
    setWeightLog(prev => prev.filter(e => e.id !== id));
  };

  const saveExWeight = async (key) => {
    const val = exWeightInput.trim();
    if (!val) return;
    await db.from("exercise_weights").upsert({ user_key: activeUser, key, value: val }, { onConflict: "user_key,key" });
    setExerciseWeights(prev => ({ ...prev, [key]: val }));
    setEditingEx(null);
    setExWeightInput("");
  };

  const clearExWeight = async (key) => {
    await db.from("exercise_weights").delete().eq("user_key", activeUser).eq("key", key);
    setExerciseWeights(prev => { const n = { ...prev }; delete n[key]; return n; });
  };

  const addMeal = async () => {
    const cal = parseInt(mealCal);
    if (!mealName.trim() || isNaN(cal) || cal <= 0) return;
    const { data } = await db.from("meal_logs").insert({ user_key: activeUser, name: mealName.trim(), calories: cal, date: today }).select().single();
    if (data) setMealLog(prev => [...prev, data]);
    setMealName("");
    setMealCal("");
  };

  const deleteMeal = async (id) => {
    await db.from("meal_logs").delete().eq("id", id);
    setMealLog(prev => prev.filter(m => m.id !== id));
  };

  const todayMeals = mealLog.filter(m => m.date === today);
  const todayCalIn = todayMeals.reduce((s, m) => s + m.calories, 0);
  const CAL_GOAL = CAL_GOALS[activeUser] || 1500;

  const searchCalories = async () => {
    if (!mealName.trim()) return;
    setSearching(true);
    setCalEstimates([]);
    try {
      const res = await fetch(`https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(mealName)}&pageSize=6&api_key=DEMO_KEY`);
      const data = await res.json();
      const results = (data.foods || []).map(food => {
        const e = food.foodNutrients?.find(n => n.nutrientId === 1008 || n.nutrientName === "Energy");
        const cal = e ? Math.round(e.value) : null;
        const serving = food.servingSize ? `${food.servingSize}${food.servingSizeUnit}` : "100g";
        return { name: food.description, cal, serving, brand: food.brandOwner };
      }).filter(r => r.cal !== null && r.cal > 0).slice(0, 5);
      setCalEstimates(results);
    } catch {}
    setSearching(false);
  };

  const startWeight = weightLog.length > 0 ? weightLog[0].weight : null;
  const currentWeight = weightLog.length > 0 ? weightLog[weightLog.length - 1].weight : null;
  const totalLost    = startWeight && currentWeight ? (startWeight - currentWeight).toFixed(1) : null;

  return (
    <div className="app-shell">

      {/* ── Header ── */}
      <div className="header">
        <div className="header-top">
          <div>
            <div className="eyebrow">Do this or kys </div>
            <div className="brand">Summer Arc</div>
          </div>
          <div className="user-switch">
            {[{ key: USERS.sadiya, label: "Sadiya" }, { key: USERS.muhammad, label: "Muhammad" }].map(u => (
              <button key={u.key} className={`user-btn ${activeUser === u.key ? "active" : ""}`} onClick={() => switchUser(u.key)}>
                {u.label}
              </button>
            ))}
          </div>
        </div>
        <div className="quote-box">
          <div className="quote">"{quote.text}"</div>
          <div className="quote-author">{quote.author}</div>
        </div>
      </div>

      {/* ── Content ── */}
      <div className="content">

        {/* Level selector */}
        <div className="level-wrap">
          {["beginner", "intermediate"].map(l => (
            <button key={l} className={`level-btn ${level === l ? "active" : ""}`}
              onClick={() => { setLevel(l); setActiveDay(0); setExpandedEx(null); }}>
              {workoutPlans[l].label}
            </button>
          ))}
        </div>

        {/* Stats */}
        <div className="stats-grid">
          <div className="stat-card">
            <div className="stat-number" style={{ color: "var(--sky)" }}>~{totalWeekCal}</div>
            <div className="stat-unit">kcal</div>
            <div className="stat-label">Week Burn</div>
          </div>
          <div className="stat-card">
            <div className="stat-number" style={{ color: "var(--terracotta)" }}>{completedDays}/7</div>
            <div className="stat-unit">days</div>
            <div className="stat-label">Done</div>
          </div>
          <div className="stat-card">
            <div className="stat-number" style={{ color: "var(--deep)" }}>~{dayCalBurned}</div>
            <div className="stat-unit">kcal</div>
            <div className="stat-label">Today Earned</div>
          </div>
        </div>

        {/* Tabs */}
        <div className="tabs">
          {[{ id: "workout", label: "✦ workout" }, { id: "meals", label: "✿ meals" }, { id: "weight", label: "◎ weight" }, { id: "tips", label: "✦ tips" }].map(t => (
            <button key={t.id} className={`tab-btn ${tab === t.id ? "active" : ""}`} onClick={() => setTab(t.id)}>{t.label}</button>
          ))}
        </div>

        {/* ── Workout Tab ── */}
        {tab === "workout" && (
          <div>
            <div className="days-scroll">
              {plan.days.map((d, i) => {
                const allDone = d.exercises.every((_, ei) => !!completedExercises[`${level}-${i}-${ei}`]);
                return (
                  <button key={i} className={`day-btn ${activeDay === i ? "active" : ""} ${allDone && activeDay !== i ? "done" : ""}`}
                    onClick={() => { setActiveDay(i); setExpandedEx(null); }}>
                    <div style={{ fontSize: 18 }}>{d.emoji}</div>
                    <div className="day-name">{d.day.slice(0, 3)}</div>
                    {allDone && <div className="day-done-tick">✓</div>}
                  </button>
                );
              })}
            </div>

            <div className="hero-card">
              <div className="hero-day">{dayData.day}</div>
              <div className="hero-title">{dayData.emoji} {dayData.focus}</div>
              <div className="hero-sub">~{dayData.totalCal} kcal potential burn</div>
              <div className="hero-progress">
                <div>
                  <div className="hero-count">{doneCount}/{dayData.exercises.length}</div>
                  <div className="hero-count-label">exercises done</div>
                </div>
                <div className="hero-earned">~{dayCalBurned} kcal<br />earned so far</div>
              </div>
            </div>

            <div className="mini-tags">
              <span className="mini-tag">♪ {cardioCount} cardio</span>
              <span className="mini-tag">★ {gymCount} gym</span>
              {absCount > 0 && <span className="mini-tag">♡ {absCount} abs</span>}
            </div>

            <div className="exercise-list">
              {dayData.exercises.map((ex, i) => {
                const isCardio = ex.type === "cardio";
                const isAbs = ex.type === "abs";
                const exKey = `${level}-${activeDay}-${i}-weight`;
                const savedW = exerciseWeights[exKey];
                const isEditingThis = editingEx === exKey;
                const done = isCompleted(i);
                const iconBg = done ? "var(--moss)" : isCardio ? "var(--terracotta)" : isAbs ? "var(--moss)" : "var(--sky)";
                const tipBorderClass = isCardio ? "tip-border-cardio" : isAbs ? "tip-border-abs" : "tip-border-gym";
                return (
                  <div key={i} className={`exercise-card ${done ? "completed-card" : ""}`}>
                    <div className={`exercise-main ${done ? "completed" : ""}`} onClick={() => toggleExercise(i)}>
                      <div className="exercise-icon" style={{ background: iconBg }}>
                        {done ? <span style={{ color: "#fff", fontWeight: "bold", fontSize: 16 }}>✓</span>
                               : isCardio ? "♪" : isAbs ? "♡" : "★"}
                      </div>
                      <div className="exercise-content">
                        <div className={`exercise-name ${done ? "done" : ""}`}>
                          {ex.name}
                          {i === 0 && <span className="start-badge">START</span>}
                        </div>
                        <div className="exercise-meta">
                          {ex.sets > 1 ? `${ex.sets} sets × ` : ""}{ex.reps}
                        </div>
                        {!isCardio && (
                          <div className="exercise-weight-area">
                            {isEditingThis ? (
                              <div className="inline-edit" onClick={e => e.stopPropagation()}>
                                <input className="inline-input" autoFocus value={exWeightInput}
                                  onChange={e => setExWeightInput(e.target.value)}
                                  onKeyDown={e => { if (e.key === "Enter") saveExWeight(exKey); if (e.key === "Escape") { setEditingEx(null); setExWeightInput(""); }}}
                                  placeholder="e.g. 25 lbs" />
                                <button className="save-btn" onClick={() => saveExWeight(exKey)}>✓</button>
                                <button className="cancel-btn" onClick={() => { setEditingEx(null); setExWeightInput(""); }}>✕</button>
                              </div>
                            ) : savedW ? (
                              <div style={{ display: "flex", alignItems: "center", gap: 6 }} onClick={e => e.stopPropagation()}>
                                <span className="weight-pill">★ {savedW}</span>
                                <button className="pill-edit-btn" onClick={() => { setEditingEx(exKey); setExWeightInput(savedW); }}>edit</button>
                                <button className="pill-edit-btn" onClick={() => clearExWeight(exKey)}>✕</button>
                              </div>
                            ) : (
                              <button className="weight-log-btn" onClick={e => { e.stopPropagation(); setEditingEx(exKey); setExWeightInput(""); }}>
                                + log weight
                              </button>
                            )}
                          </div>
                        )}
                      </div>
                      <div className="exercise-right">
                        <div className="exercise-cal">
                          <div className="cal-num">{ex.cal}</div>
                          <div className="cal-unit">kcal</div>
                        </div>
                        <button className="tip-toggle" onClick={e => { e.stopPropagation(); setExpandedEx(expandedEx === i ? null : i); }}>
                          {expandedEx === i ? "▲" : "▼ tip"}
                        </button>
                      </div>
                    </div>
                    {expandedEx === i && (
                      <div className={`exercise-tip-panel ${tipBorderClass}`}>
                        ✦ {ex.note}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            <div className="progress-wrap">
              <div className="progress-track">
                <div className="progress-fill" style={{ width: `${pct}%` }} />
              </div>
              <div className="progress-label">{pct}% complete</div>
            </div>
          </div>
        )}

        {/* ── Meals Tab ── */}
        {tab === "meals" && (
          <div>
            <div className="section-card" style={{ background: "linear-gradient(135deg, rgba(9,47,51,0.9), rgba(175,80,49,0.8))", color: "#fff", marginBottom: 16 }}>
              <div style={{ fontSize: 12, letterSpacing: 2, textTransform: "lowercase", opacity: 0.7, marginBottom: 6 }}>today — {today}</div>
              <div style={{ display: "flex", alignItems: "flex-end", gap: 8, marginBottom: 14 }}>
                <div style={{ fontFamily: "Cormorant Garamond, serif", fontSize: 52, fontWeight: 400, lineHeight: 1 }}>{todayCalIn}</div>
                <div style={{ fontSize: 14, opacity: 0.7, marginBottom: 8 }}>/ {CAL_GOAL} kcal</div>
              </div>
              <div style={{ background: "rgba(255,255,255,0.2)", borderRadius: 999, height: 6, overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${Math.min((todayCalIn / CAL_GOAL) * 100, 100)}%`, background: todayCalIn > CAL_GOAL ? "var(--wine)" : "var(--sand)", borderRadius: 999, transition: "width 0.4s ease" }} />
              </div>
              <div style={{ fontSize: 12, opacity: 0.65, marginTop: 8 }}>
                {todayCalIn >= CAL_GOAL ? `${todayCalIn - CAL_GOAL} over goal` : `${CAL_GOAL - todayCalIn} remaining`}
              </div>
            </div>

            <div className="section-card">
              <div className="section-title">log a meal</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <div style={{ display: "flex", gap: 8 }}>
                  <input value={mealName} onChange={e => { setMealName(e.target.value); setCalEstimates([]); }}
                    onKeyDown={e => e.key === "Enter" && (calEstimates.length === 0 ? searchCalories() : addMeal())}
                    placeholder="what did you eat?"
                    className="main-input" style={{ flex: 1 }} />
                  <button onClick={searchCalories} disabled={searching || !mealName.trim()}
                    style={{ padding: "12px 16px", borderRadius: 16, border: "0.5px solid rgba(9,47,51,0.1)", background: "#fff", color: "var(--terracotta)", fontSize: 12, cursor: "pointer", whiteSpace: "nowrap", opacity: !mealName.trim() ? 0.4 : 1 }}>
                    {searching ? "…" : "estimate"}
                  </button>
                </div>
                {calEstimates.length > 0 && (
                  <div style={{ border: "0.5px solid rgba(9,47,51,0.08)", borderRadius: 16, overflow: "hidden" }}>
                    {calEstimates.map((r, i) => (
                      <div key={i} onClick={() => { setMealCal(String(r.cal)); setCalEstimates([]); }}
                        style={{ padding: "12px 16px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: i < calEstimates.length - 1 ? "0.5px solid rgba(9,47,51,0.06)" : "none", background: "#fff" }}>
                        <div>
                          <div style={{ fontSize: 13, color: "var(--deep)" }}>{r.name.length > 38 ? r.name.slice(0, 38) + "…" : r.name}</div>
                          <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 2 }}>per {r.serving}{r.brand ? ` · ${r.brand}` : ""}</div>
                        </div>
                        <div style={{ fontFamily: "Cormorant Garamond, serif", fontSize: 20, color: "var(--wine)", marginLeft: 12 }}>{r.cal}</div>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{ display: "flex", gap: 8 }}>
                  <input type="number" value={mealCal} onChange={e => setMealCal(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && addMeal()}
                    placeholder="calories" className="main-input" style={{ flex: 1 }} />
                  <button className="add-btn" onClick={addMeal}>+</button>
                </div>
              </div>
            </div>

            {todayMeals.length > 0 && (
              <div className="section-card">
                <div className="section-title">today</div>
                {todayMeals.map(meal => (
                  <div key={meal.id} className="weight-entry">
                    <div>
                      <div style={{ fontSize: 16, color: "var(--deep)", fontFamily: "Cormorant Garamond, serif" }}>{meal.name}</div>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <div style={{ fontFamily: "Cormorant Garamond, serif", fontSize: 20, color: "var(--wine)" }}>{meal.calories}</div>
                      <button className="delete-btn" onClick={() => deleteMeal(meal.id)}>✕</button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {(() => {
              const pastMeals = mealLog.filter(m => m.date !== today);
              const byDate = pastMeals.reduce((acc, m) => { (acc[m.date] = acc[m.date] || []).push(m); return acc; }, {});
              const dates = Object.keys(byDate).reverse();
              if (!dates.length) return null;
              return (
                <div className="section-card">
                  <div className="section-title">past days</div>
                  {dates.map(date => {
                    const dayTotal = byDate[date].reduce((s, m) => s + m.calories, 0);
                    return (
                      <div key={date} style={{ marginBottom: 16 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                          <div style={{ fontSize: 13, color: "var(--muted)", fontStyle: "italic" }}>{date}</div>
                          <div style={{ fontFamily: "Cormorant Garamond, serif", fontSize: 18, color: dayTotal > CAL_GOAL ? "var(--wine)" : "var(--moss)" }}>{dayTotal} kcal</div>
                        </div>
                        {byDate[date].map(meal => (
                          <div key={meal.id} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "0.5px solid rgba(9,47,51,0.05)" }}>
                            <div style={{ fontSize: 13, color: "var(--text)" }}>{meal.name}</div>
                            <div style={{ fontSize: 13, color: "var(--muted)" }}>{meal.calories}</div>
                          </div>
                        ))}
                      </div>
                    );
                  })}
                </div>
              );
            })()}

            {mealLog.length === 0 && (
              <div style={{ textAlign: "center", padding: "50px 20px", color: "var(--muted)" }}>
                <div style={{ fontFamily: "Cormorant Garamond, serif", fontSize: 22, fontStyle: "italic", marginBottom: 8 }}>nothing logged yet</div>
                <div style={{ fontSize: 13 }}>add your first meal above</div>
              </div>
            )}
          </div>
        )}
        {/* ── Weight Tab ── */}
        {tab === "weight" && (
          <div>
            {weightLog.length >= 2 && (
              <div className="weight-stats">
                {[
                  { label: "Starting", value: `${startWeight} ${weightLog[0].unit}`, color: "var(--sky)" },
                  { label: "Current",  value: `${currentWeight} ${weightLog[weightLog.length-1].unit}`, color: "var(--deep)" },
                  { label: totalLost > 0 ? "Lost ♡" : "Gained", value: `${Math.abs(totalLost)} ${weightLog[0].unit}`, color: totalLost > 0 ? "var(--moss)" : "var(--wine)" },
                ].map(s => (
                  <div key={s.label} className="weight-stat">
                    <div className="weight-stat-val" style={{ color: s.color }}>{s.value}</div>
                    <div className="weight-stat-lbl">{s.label}</div>
                  </div>
                ))}
              </div>
            )}

            <div className="section-card">
              <div className="section-title">Log Today's Weight</div>
              <div className="input-row">
                <input className="main-input" type="number" value={weightInput}
                  onChange={e => setWeightInput(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && addWeight()}
                  placeholder="e.g. 145" />
                <div className="unit-switch">
                  {["lbs", "kg"].map(u => (
                    <button key={u} className={`unit-btn ${weightUnit === u ? "active" : ""}`} onClick={() => setWeightUnit(u)}>{u}</button>
                  ))}
                </div>
                <button className="add-btn" onClick={addWeight}>+</button>
              </div>
            </div>

            {weightLog.length >= 2 && (() => {
              const min = Math.min(...weightLog.map(e => e.weight));
              const max = Math.max(...weightLog.map(e => e.weight));
              const range = max - min || 1;
              const W = 300, H = 120, PAD = 16;
              const pts = weightLog.map((e, i) => ({
                x: PAD + (i / (weightLog.length - 1)) * (W - PAD * 2),
                y: PAD + ((max - e.weight) / range) * (H - PAD * 2),
              }));
              const path = pts.map((p, i) => `${i === 0 ? "M" : "L"} ${p.x} ${p.y}`).join(" ");
              const area = `${path} L ${pts[pts.length-1].x} ${H} L ${pts[0].x} ${H} Z`;
              return (
                <div className="section-card">
                  <div className="section-title">Progress Chart</div>
                  <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ overflow: "visible" }}>
                    <defs>
                      <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stopColor="#980204" stopOpacity="0.18" />
                        <stop offset="100%" stopColor="#980204" stopOpacity="0" />
                      </linearGradient>
                    </defs>
                    <path d={area} fill="url(#areaGrad)" />
                    <path d={path} fill="none" stroke="#980204" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
                    {pts.map((p, i) => (
                      <g key={i}>
                        <circle cx={p.x} cy={p.y} r="4" fill="#980204" />
                        <text x={p.x} y={p.y - 8} textAnchor="middle" fontSize="9" fill="#999">{weightLog[i].weight}</text>
                      </g>
                    ))}
                    <text x={pts[0].x} y={H - 2} textAnchor="middle" fontSize="9" fill="#ccc">{weightLog[0].date}</text>
                    <text x={pts[pts.length-1].x} y={H - 2} textAnchor="middle" fontSize="9" fill="#ccc">{weightLog[weightLog.length-1].date}</text>
                  </svg>
                </div>
              );
            })()}

            {weightLog.length > 0 ? (
              <div className="section-card">
                <div className="section-title">Log History</div>
                {[...weightLog].reverse().map((entry, i) => {
                  const realIdx = weightLog.length - 1 - i;
                  const prev = weightLog[realIdx - 1];
                  const diff = prev ? (entry.weight - prev.weight).toFixed(1) : null;
                  const isLatest = realIdx === weightLog.length - 1;
                  return (
                    <div key={entry.id} className={`weight-entry ${isLatest ? "latest" : ""}`}>
                      <div>
                        <div style={{ fontWeight: 600, fontSize: 16, color: "var(--deep)" }}>{entry.weight} {entry.unit}</div>
                        <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 2 }}>{entry.date}</div>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        {diff !== null && (
                          <div style={{ fontSize: 13, fontWeight: 600, color: parseFloat(diff) < 0 ? "var(--moss)" : parseFloat(diff) > 0 ? "var(--wine)" : "var(--muted)" }}>
                            {parseFloat(diff) > 0 ? "+" : ""}{diff}
                          </div>
                        )}
                        <button className="delete-btn" onClick={() => deleteWeight(entry.id)}>✕</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            ) : (
              <div style={{ textAlign: "center", padding: "40px 20px", color: "var(--muted)" }}>
                <div style={{ fontSize: 40, marginBottom: 10 }}>◎</div>
                <div style={{ fontSize: 14 }}>Log your first weight above to start tracking</div>
              </div>
            )}
          </div>
        )}

        {/* ── Tips Tab ── */}
        {tab === "tips" && (
          <div>
            <div className="section-card">
              <div className="section-title">Calorie-Cutting Tips</div>
              <div style={{ fontSize: 12, color: "var(--muted)", marginBottom: 16 }}>Small habits = big results over time</div>
              {tips.map((tip, i) => (
                <div key={i} className="tip-card">{tip}</div>
              ))}
            </div>
            <div className="goal-card">
              <div style={{ fontSize: 13, letterSpacing: 2, textTransform: "uppercase", opacity: 0.7 }}>Daily Calorie Goal</div>
              <div className="goal-number">1,400–1,600</div>
              <div style={{ fontSize: 13, opacity: 0.75 }}>kcal/day for steady weight loss</div>
              <div style={{ fontSize: 11, opacity: 0.5, marginTop: 10 }}>Always consult a doctor for personalized targets</div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
